minutes: 18
tone: cinematic, witty, high-stakes, audio-first
episode_structure:
  - cold_open_cliff_recap
  - quest_hook
  - combat_or_skill_trial
  - loot_xp_class_update
  - character_callback
  - boss_reversal
  - cliffhanger
cast_roles:
  NARRATOR: Warm, cinematic guide with crisp action clarity.
  HERO: Newly awakened adventurer, brave but still learning the rules.
  SYSTEM: Precise game interface voice for notifications and mechanics.
  SIDEKICK: Quick, loyal companion who turns exposition into banter.
  BOSS: Commanding antagonist with readable menace and tactical pressure.
  RIVAL: Competitive survivor with grudging respect for the hero.
  MENTOR: Experienced delver who knows more than they admit.
  MERCHANT: Opportunistic vendor with suspiciously useful inventory.
  HEALER: Practical support character with dry triage humor.
  TANK: Front-line bruiser who treats danger as logistics.
  ROGUE: Sneaky opportunist who notices traps and social leverage.
  MAGE: Rules-minded caster who explains mechanics under stress.
  BEAST: Monster or summoned creature with simple but distinct vocal identity.
  MINION: Disposable enemy voice for crowd texture and combat beats.
  GUIDE: Dungeon tutorial voice separate from the hostile SYSTEM.
  VILLAIN: Long-arc antagonist who should feel different from BOSS.
voices:
  NARRATOR:
    provider: openai
    model: gpt-4o-mini-tts
    voice: ballad
    instructions: Warm, cinematic narration with crisp action clarity.
  HERO:
    provider: openai
    model: gpt-4o-mini-tts
    voice: ash
    instructions: Dry, confident, grounded lead voice; brave without theatrical polish.
  SYSTEM:
    provider: openai
    model: gpt-4o-mini-tts
    voice: onyx
    instructions: Flat bureaucratic precision. No warmth. No humor. Every word is a policy notification.
  SIDEKICK:
    provider: openai
    model: gpt-4o-mini-tts
    voice: coral
    instructions: Bright, fast, emotionally readable support voice without becoming shrill.
  BOSS:
    provider: openai
    model: gpt-4o-mini-tts
    voice: echo
    instructions: Resonant, controlled authority with tactical menace.
  RIVAL:
    provider: openai
